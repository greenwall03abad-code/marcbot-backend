events {}
http {
    server {
        listen 80;
        root /var/www/html;
        index index.php;
        location / {
            if ($request_method = OPTIONS) {
                return 204;
            }
        }
        location ~ \.php$ {
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_read_timeout 120;
            include fastcgi_params;
        }
    }
}
